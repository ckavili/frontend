---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: canopy-ui
  {{- if .Values.BACKEND_ENDPOINT}}
  annotations:
    app.openshift.io/connects-to: '[{"apiVersion":"apps/v1","kind":"Deployment","name":"canopy-backend"}]'
  {{- end }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: canopy-ui
  template:
    metadata:
      annotations:
        instrumentation.opentelemetry.io/inject-python: redhat-ods-monitoring/data-science-instrumentation
      labels:
        app: canopy-ui
        monitoring.opendatahub.io/scrape: 'true'
    spec:
      containers:
        - name: canopy-ui
          image: quay.io/rhoai-genaiops/{{ .Values.image.name }}:{{ .Values.image.tag }}
          ports:
            - containerPort: 8501
          env:
           {{- if not .Values.BACKEND_ENDPOINT}}
            - name: LLM_ENDPOINT
              value: "{{ .Values.LLM_ENDPOINT }}"
            - name: SYSTEM_PROMPT
              value: "{{ .Values.SYSTEM_PROMPT}}"
            - name: MODEL_NAME
              value: "{{ .Values.MODEL_NAME }}"
          {{- else }}
            - name: BACKEND_ENDPOINT
              value: "{{ .Values.BACKEND_ENDPOINT }}"
          {{- end }}
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "1.0"
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: "http://data-science-collector-collector-headless.redhat-ods-monitoring.svc.cluster.local:4318/v1/traces"
            - name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
              value: "http://data-science-collector-collector-headless.redhat-ods-monitoring.svc.cluster.local:4318/v1/metrics"
            - name: OTEL_LOGS_EXPORTER
              value: "none"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://data-science-collector-collector-headless.redhat-ods-monitoring.svc.cluster.local:4318"
            - name: TELEMETRY_SINKS
              value: "otel_trace"
